name: Bump version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version component to bump
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump:
    name: Bump ${{ inputs.bump }} version
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-edit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-edit

      - name: Bump version in Cargo.toml
        run: cargo set-version --bump ${{ inputs.bump }}

      - name: Read new version
        id: version
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | \
            python3 -c "import sys,json; print(json.load(sys.stdin)['packages'][0]['version'])")
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to v${{ steps.version.outputs.value }}"
          git tag "v${{ steps.version.outputs.value }}"
          git push origin HEAD --tags
